    <title>vientonorte — Proyectos</title>
    <style>
         :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --accent-alpha: rgba(88, 166, 255, 0.1);
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --purple: #bc8cff;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .skip-link {
            position: absolute;
            left: 0;
            top: 0;
            clip-path: inset(100%);
            background: var(--accent);
            color: #000;
            padding: 8px 16px;
            font-size: 14px;
            z-index: 9999;
            text-decoration: none;
        }
        .skip-link:focus { clip-path: inset(0); }

        .svg-sprite { display: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 2rem 1.5rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            color: var(--text-muted);
            margin-top: 0.25rem;
            font-size: 0.95rem;
        }

        .stats {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stat strong {
            color: var(--text);
            font-size: 1.1rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot--live {
            background: var(--green);
        }

        .dot--private {
            background: var(--yellow);
        }

        .dot--off {
            background: var(--text-muted);
        }

        .dot--deprecated {
            background: var(--red);
        }

        .dot--sprint {
            background: var(--accent);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: border-color 0.15s;
        }

        .card:hover,
        .card:focus-within {
            border-color: var(--accent);
        }

        .card__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .card__title {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .card__title a {
            color: var(--accent);
            text-decoration: none;
        }

        .card__title a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .card__badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            border: 1px solid;
            white-space: nowrap;
            font-weight: 500;
        }

        .card__badge--live {
            color: var(--green);
            border-color: var(--green);
        }

        .card__badge--private {
            color: var(--yellow);
            border-color: var(--yellow);
        }

        .card__badge--repo {
            color: var(--purple);
            border-color: var(--purple);
        }

        .card__badge--deprecated {
            color: var(--red);
            border-color: var(--red);
        }

        .card--deprecated .card__desc,
        .card--deprecated .card__tags {
            opacity: 0.6;
        }

        .card__desc {
            color: var(--text-muted);
            font-size: 0.875rem;
            flex: 1;
        }

        .card__tags {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .tag {
            font-size: 0.7rem;
            background: var(--accent-alpha);
            color: var(--accent);
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
        }

        .card__links {
            display: flex;
            gap: 0.75rem;
            font-size: 0.8rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .card__links a {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.15s;
        }

        .card__links .link-disabled {
            color: var(--text-muted);
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: not-allowed;
        }

        .card__links a:hover {
            color: var(--accent-hover);
        }

        .icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.15s;
        }

        footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 2px;
            color: var(--accent-hover);
        }

        @media (prefers-reduced-motion: reduce) {
            .card,
            .card__links a,
            footer a {
                transition: none;
            }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.3rem;
            }
        }

        /* ── Passkey button ── */
        .header__top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .btn-passkey {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.78rem;
            padding: 0.3rem 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-passkey:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-passkey--active {
            border-color: var(--green);
            color: var(--green);
        }

        .btn-passkey:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* skeleton loader while JSON loads */
        .card--skeleton {
            min-height: 180px;
            background: linear-gradient(
                90deg,
                var(--surface) 25%,
                var(--border) 50%,
                var(--surface) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .card--skeleton { animation: none; }
        }

        /* error and toast messages */
        .load-error {
            color: var(--text-muted);
            padding: 1rem;
        }

        .passkey-toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--red);
            color: var(--text);
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            z-index: 999;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }

        .passkey-toast--visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <!-- SVG sprite — iconos reutilizables via <use href="#id"> -->
    <svg class="svg-sprite" aria-hidden="true" focusable="false">
        <defs>
            <symbol id="icon-site" viewBox="0 0 16 16">
                <path d="M4.5 8a.75.75 0 0 0 0 1.5h7a.75.75 0 0 0 0-1.5h-7Z"/>
                <path d="M1 1.75C1 .784 1.784 0 2.75 0h10.5c.966 0 1.75.784 1.75 1.75v12.5A1.75 1.75 0 0 1 13.25 16H2.75A1.75 1.75 0 0 1 1 14.25V1.75Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25Z"/>

            <symbol id="icon-github" viewBox="0 0 16 16">
                <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>

    <a class="skip-link" href="#proyectos">Saltar al contenido</a>

    <header>
        <div class="header__top">
            <div>
                <h1><span>vientonorte</span> — proyectos</h1>
                <p>Rodrigo Gaete Gaona · UX Lead · Investigador doctoral en Antropología</p>
            </div>
            <button id="btn-passkey" class="btn-passkey" aria-live="polite" hidden>
                <!-- icon and label injected by JS -->
            </button>
        </div>
        <ul class="stats" role="list" id="stats-list" aria-label="Estadísticas de proyectos">
            <!-- rendered by JS -->

    <main id="proyectos">
        <div class="grid" id="cards-grid" aria-label="Proyectos">
            <!-- skeleton placeholders while JSON loads -->
            <div class="card card--skeleton" aria-hidden="true"></div>
            <div class="card card--skeleton" aria-hidden="true"></div>
            <div class="card card--skeleton" aria-hidden="true"></div>
        </div>
    </main>

    <footer>
        <p>vientonorte · <a href="https://github.com/vientonorte">github.com/vientonorte</a> · Mayo 2026</p>
    </footer>

    <div id="passkey-toast" class="passkey-toast" role="alert" aria-live="assertive"></div>

    <script>
    /* ── Passkey helpers ────────────────────────────────────────────── */
    const CREDENTIAL_KEY = 'vn_passkey_id';
    const AUTH_SESSION_KEY = 'vn_auth';
    const supportsPasskey = () =>
        window.PublicKeyCredential !== undefined &&
        typeof navigator.credentials?.create === 'function';

    const isAuthenticated = () =>
        sessionStorage.getItem(AUTH_SESSION_KEY) === '1';

    const hasRegisteredPasskey = () =>
        !!localStorage.getItem(CREDENTIAL_KEY);

    function passkeyState() {
        if (isAuthenticated())       return 'authenticated';
        if (hasRegisteredPasskey())  return 'registered';
        return 'none';
    }

    function rpId() {
        /* WebAuthn requires a non-empty rpId matching the effective domain.
           file:// has an empty hostname; WebAuthn won't work there anyway,
           but we guard with supportsPasskey() before ever calling this. */
        return location.hostname || 'localhost';
    }

    async function registerPasskey() {
        const challenge = crypto.getRandomValues(new Uint8Array(32));
        const credential = await navigator.credentials.create({
            publicKey: {
                challenge,
                rp: { name: 'vientonorte', id: rpId() },
                user: {
                    id: new TextEncoder().encode('vientonorte-owner'),
                    name: 'vientonorte',
                    displayName: 'Rodrigo Gaete'
                },
                pubKeyCredParams: [
                    { type: 'public-key', alg: -7 },
                    { type: 'public-key', alg: -257 }
                ],
                authenticatorSelection: {
                    userVerification: 'required',
                    residentKey: 'preferred'
                },
                timeout: 60000
            }
        });
        const idBase64 = btoa(String.fromCharCode(
            ...new Uint8Array(credential.rawId)
        ));
        localStorage.setItem(CREDENTIAL_KEY, idBase64);
        sessionStorage.setItem(AUTH_SESSION_KEY, '1');
    }

    async function authenticatePasskey() {
        const stored = localStorage.getItem(CREDENTIAL_KEY);
        if (!stored) throw new Error('No passkey registered');
        const credentialId = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
        const challenge = crypto.getRandomValues(new Uint8Array(32));
        const assertion = await navigator.credentials.get({
            publicKey: {
                challenge,
                rpId: rpId(),
                allowCredentials: [{ type: 'public-key', id: credentialId }],
                userVerification: 'required',
                timeout: 60000
            }
        });
        if (assertion) {
            sessionStorage.setItem(AUTH_SESSION_KEY, '1');
            return true;
        }
        return false;
    }

    /* ── Passkey button UI ──────────────────────────────────────────── */
    const ICONS = {
        lock:   `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 7V5a4 4 0 0 1 8 0v2h.5A1.5 1.5 0 0 1 14 8.5v5A1.5 1.5 0 0 1 12.5 15h-9A1.5 1.5 0 0 1 2 13.5v-5A1.5 1.5 0 0 1 3.5 7H4Zm1.5 0h5V5a2.5 2.5 0 0 0-5 0v2Z"/></svg>`,
        unlock: `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M11 1a4 4 0 0 0-4 4v2H3.5A1.5 1.5 0 0 0 2 8.5v5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 12.5 7H8.5V5a2.5 2.5 0 0 1 5 0 .75.75 0 0 0 1.5 0A4 4 0 0 0 11 1Z"/></svg>`,
        key:    `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M10.5 0a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11Zm0 1.5a4 4 0 1 0 0 8 4 4 0 0 0 0-8ZM3.982 9.074l-3.75 3.75a.75.75 0 0 0 1.06 1.06l.19-.189V15a.75.75 0 0 0 1.5 0v-1.5h1.5a.75.75 0 0 0 0-1.5H4.5l2.5-2.5a5.465 5.465 0 0 1-3.018-1.426Z"/></svg>`
    };

    function updatePasskeyButton(btn) {
        const state = passkeyState();
        btn.removeAttribute('hidden');
        if (state === 'authenticated') {
            btn.innerHTML = `${ICONS.unlock} Acceso activo`;
            btn.className = 'btn-passkey btn-passkey--active';
            btn.setAttribute('aria-label', 'Acceso activo — clic para cerrar sesión');
            btn.title = 'Clic para cerrar sesión privada';
        } else if (state === 'registered') {
            btn.innerHTML = `${ICONS.lock} Desbloquear`;
            btn.className = 'btn-passkey';
            btn.setAttribute('aria-label', 'Desbloquear acceso privado con passkey');
            btn.title = 'Autenticar con passkey para ver repos privados';
        } else {
            btn.innerHTML = `${ICONS.key} Configurar passkey`;
            btn.className = 'btn-passkey';
            btn.setAttribute('aria-label', 'Configurar passkey de acceso privado');
            btn.title = 'Registrar passkey para acceder a repos privados';
        }
    }

    /* ── Card renderer ──────────────────────────────────────────────── */
    const BADGE_MAP = {
        live:       ['LIVE',       'card__badge--live'],
        private:    ['PRIVADO',    'card__badge--private'],
        repo:       ['REPO',       'card__badge--repo'],
        deprecated: ['DEPRECATED', 'card__badge--deprecated']
    };

    const ICONS_CARD = {
        site:   `<svg class="icon" aria-hidden="true"><use href="#icon-site"></use></svg>`,
        github: `<svg class="icon" aria-hidden="true"><use href="#icon-github"></use></svg>`
    };

    function renderLink(link, authenticated) {
        if (link.requiresAuth && !authenticated) {
            return `<span class="link-disabled"
                         aria-label="Código no disponible — repositorio privado"
                         aria-disabled="true">
                        ${ICONS_CARD.github}
                        Acceso restringido
                    </span>`;
        }
        const icon = link.icon ? ICONS_CARD[link.icon] ?? '' : '';
        return `<a href="${link.href}"${link.requiresAuth ? ' rel="noopener"' : ''}>${icon}${link.label}</a>`;
    }

    function renderCard(project, authenticated) {
        const [badgeText, badgeClass] = BADGE_MAP[project.badge] ?? ['', ''];
        const cardClass = project.deprecated ? 'card card--deprecated' : 'card';
        const titleEl = project.links?.[0]?.href && !project.links[0].requiresAuth
            ? `<a href="${project.links[0].href}">${project.title}</a>`
            : project.title;
        const tags = (project.tags ?? [])
            .map(t => `<li class="tag">${t}</li>`)
            .join('');
        const links = (project.links ?? [])
            .map(l => renderLink(l, authenticated))
            .join('');

        return `
        <article class="${cardClass}" aria-label="${project.title}">
            <div class="card__header">
                <h2 class="card__title">${titleEl}</h2>
                ${badgeText ? `<span class="card__badge ${badgeClass}">${badgeText}</span>` : ''}
            </div>
            <div class="card__desc">${project.desc ?? ''}</div>
            <ul class="card__tags" role="list">${tags}</ul>
            <div class="card__links">${links}</div>
        </article>`;
    }

    function renderStats(stats) {
        return stats.map(s => `
            <li class="stat">
                <span class="dot dot--${s.dot}" aria-hidden="true"></span>
                <strong>${s.value}</strong> ${s.label}
            </li>`).join('');
    }

    /* ── Toast helper ────────────────────────────────────────────────── */
    let _toastTimer;
    function showToast(msg) {
        const toast = document.getElementById('passkey-toast');
        toast.textContent = msg;
        toast.classList.add('passkey-toast--visible');
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => toast.classList.remove('passkey-toast--visible'), 4000);
    }

    /* ── Bootstrap ──────────────────────────────────────────────────── */
    (async () => {
        const grid   = document.getElementById('cards-grid');
        const stats  = document.getElementById('stats-list');
        const btn    = document.getElementById('btn-passkey');

        /* Fetch project data first */
        let data;
        try {
            const res = await fetch('./data/projects.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            data = await res.json();
            if (!Array.isArray(data?.projects) || !data?.meta?.stats) {
                throw new Error('Unexpected JSON structure');
            }
        } catch (err) {
            console.error('Failed to load projects:', err);
            grid.innerHTML = `<p class="load-error">Error al cargar proyectos. Recarga la página.</p>`;
            return;
        }

        function renderAll() {
            const auth = isAuthenticated();
            stats.innerHTML = renderStats(data.meta.stats);
            grid.innerHTML  = data.projects.map(p => renderCard(p, auth)).join('');
        }

        renderAll();

        /* Wire passkey button — only after data is loaded so renderAll is in scope */
        if (supportsPasskey()) {
            updatePasskeyButton(btn);

            btn.addEventListener('click', async () => {
                const state = passkeyState();
                if (state === 'authenticated') {
                    sessionStorage.removeItem(AUTH_SESSION_KEY);
                    renderAll();
                    updatePasskeyButton(btn);
                    return;
                }
                try {
                    if (state === 'none') {
                        await registerPasskey();
                    } else {
                        await authenticatePasskey();
                    }
                    renderAll();
                    updatePasskeyButton(btn);
                } catch (err) {
                    /* NotAllowedError = user cancelled the dialog — no feedback needed */
                    if (err.name !== 'NotAllowedError') {
                        console.error('Passkey error:', err);
                        showToast('Error de autenticación. Intenta de nuevo.');
                    }
                }
            });
        }
    })();
    </script>

</body>

</html>
