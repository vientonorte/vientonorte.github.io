    <style>
         :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --accent-alpha: rgba(88, 166, 255, 0.1);
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --purple: #bc8cff;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .skip-link {
            position: absolute;
            left: 0;
            top: 0;
            clip-path: inset(100%);
            background: var(--accent);
            color: #000;
            padding: 8px 16px;
            font-size: 14px;
            z-index: 9999;
            text-decoration: none;
        }
        .skip-link:focus { clip-path: inset(0); }

        .svg-sprite { display: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 2rem 1.5rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            color: var(--text-muted);
            margin-top: 0.25rem;
            font-size: 0.95rem;
        }

        .stats {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stat strong {
            color: var(--text);
            font-size: 1.1rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot--live {
            background: var(--green);
        }

        .dot--private {
            background: var(--yellow);
        }

        .dot--off {
            background: var(--text-muted);
        }

        .dot--deprecated {
            background: var(--red);
        }

        .dot--sprint {
            background: var(--accent);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: border-color 0.15s;
        }

        .card:hover,
        .card:focus-within {
            border-color: var(--accent);
        }

        .card__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .card__title {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .card__title a {
            color: var(--accent);
            text-decoration: none;
        }

        .card__title a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .card__badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            border: 1px solid;
            white-space: nowrap;
            font-weight: 500;
        }

        .card__badge--live {
            color: var(--green);
            border-color: var(--green);
        }

        .card__badge--private {
            color: var(--yellow);
            border-color: var(--yellow);
        }

        .card__badge--repo {
            color: var(--purple);
            border-color: var(--purple);
        }

        .card__badge--deprecated {
            color: var(--red);
            border-color: var(--red);
        }

        .card--deprecated .card__desc,
        .card--deprecated .card__tags {
            opacity: 0.6;
        }

        .card--locked {
            border-color: rgba(210, 153, 34, 0.25);
        }

        .card__desc--locked {
            font-style: italic;
            opacity: 0.45;
        }

        .card__desc {
            color: var(--text-muted);
            font-size: 0.875rem;
            flex: 1;
        }

        .card__tags {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .tag {
            font-size: 0.7rem;
            background: var(--accent-alpha);
            color: var(--accent);
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
        }

        .card__links {
            display: flex;
            gap: 0.75rem;
            font-size: 0.8rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .card__links a {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.15s;
        }

        .card__links .link-disabled {
            color: var(--text-muted);
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: not-allowed;
        }

        .card__links a:hover {
            color: var(--accent-hover);
        }

        .icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;

        footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.15s;
        }

        footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 2px;
            color: var(--accent-hover);
        }

        @media (prefers-reduced-motion: reduce) {
            .card,
            .card__links a,
            footer a {
                transition: none;
            }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));

        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.3rem;
            }
        }

        /* ── Passkey button ── */
        .header__top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .header__controls {

            gap: 0.5rem;

        .btn-lang,

            align-items: center;
            gap: 0.4rem;
            font-size: 0.78rem;
            padding: 0.3rem 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-lang:hover,
        .btn-passkey:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-lang--active {
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 500;
        }

        .btn-passkey--active {
            border-color: var(--green);
            color: var(--green);
        }

        .btn-lang:focus-visible,
        .btn-passkey:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* Contact links for recruiters */
        .contact-links {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .contact-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.15s;
        }

        .contact-links a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* skeleton loader while JSON loads */
        .card--skeleton {
            min-height: 180px;
            background: linear-gradient(
                90deg,
                var(--surface) 25%,
                var(--border) 50%,
                var(--surface) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .card--skeleton { animation: none; }
        }

        /* error and toast messages */
        .load-error {
            color: var(--text-muted);
            padding: 1rem;
        }

        .passkey-toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--red);
            color: var(--text);
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            z-index: 999;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }

        .passkey-toast--visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

    <script>
    /* ── Language switcher ──────────────────────────────────────────── */
    const LANG_KEY = 'vn_lang';
    const DEFAULT_LANG = 'es';
    
    const TRANSLATIONS = {
        es: {
            pageTitle: 'vientonorte — Proyectos',
            headerTitle: '— proyectos',
            skipLink: 'Saltar al contenido',
            footerMonth: 'Mayo 2026',
            lockedDesc: 'Contenido privado — desbloquea para ver los detalles.',
            lockedLink: 'Acceso restringido',
            passkeyActive: 'Acceso activo',
            passkeyUnlock: 'Desbloquear',
            passkeySetup: 'Configurar passkey',
            passkeyActiveLabelAria: 'Acceso activo — clic para cerrar sesión',
            passkeyUnlockLabelAria: 'Desbloquear acceso privado con passkey',
            passkeySetupLabelAria: 'Configurar passkey de acceso privado',
            passkeyActiveTitle: 'Clic para cerrar sesión privada',
            passkeyUnlockTitle: 'Autenticar con passkey para ver repos privados',
            passkeySetupTitle: 'Registrar passkey para acceder a repos privados',
            passkeyError: 'Error de autenticación. Intenta de nuevo.',
            loadError: 'Error al cargar proyectos. Recarga la página.',
            ariaProjects: 'Proyectos',
            ariaStats: 'Estadísticas de proyectos',
            switchLanguage: 'Cambiar idioma',
            githubProfile: 'Perfil de GitHub',
            linkedinProfile: 'Perfil de LinkedIn'
        },
        en: {
            pageTitle: 'vientonorte — Projects',
            headerTitle: '— projects',
            skipLink: 'Skip to content',
            footerMonth: 'May 2026',
            lockedDesc: 'Private content — unlock to view details.',
            lockedLink: 'Restricted access',
            passkeyActive: 'Active access',
            passkeyUnlock: 'Unlock',
            passkeySetup: 'Setup passkey',
            passkeyActiveLabelAria: 'Active access — click to log out',
            passkeyUnlockLabelAria: 'Unlock private access with passkey',
            passkeySetupLabelAria: 'Setup private access passkey',
            passkeyActiveTitle: 'Click to log out from private session',
            passkeyUnlockTitle: 'Authenticate with passkey to view private repos',
            passkeySetupTitle: 'Register passkey to access private repos',
            passkeyError: 'Authentication error. Try again.',
            loadError: 'Error loading projects. Reload the page.',
            ariaProjects: 'Projects',
            ariaStats: 'Project statistics',
            switchLanguage: 'Switch language',
            githubProfile: 'GitHub profile',
            linkedinProfile: 'LinkedIn profile'
        }
    };

    function getCurrentLang() {
        return localStorage.getItem(LANG_KEY) || DEFAULT_LANG;
    }

    function setCurrentLang(lang) {
        localStorage.setItem(LANG_KEY, lang);
        document.documentElement.lang = lang;
    }

    function t(key) {
        const lang = getCurrentLang();
        return TRANSLATIONS[lang]?.[key] || TRANSLATIONS[DEFAULT_LANG][key] || key;
    }

    function getLangValue(value) {
        if (typeof value === 'string') return value;
        if (typeof value === 'object' && value !== null) {
            const lang = getCurrentLang();
            return value[lang] || value[DEFAULT_LANG] || '';
        }
        return '';
    }

    function esc(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    /* ── Passkey helpers ────────────────────────────────────────────── */
    const CREDENTIAL_KEY = 'vn_passkey_id';
    const AUTH_SESSION_KEY = 'vn_auth';
    const supportsPasskey = () =>
        window.PublicKeyCredential !== undefined &&
        typeof navigator.credentials?.create === 'function';

    const isAuthenticated = () =>
        sessionStorage.getItem(AUTH_SESSION_KEY) === '1';

    const hasRegisteredPasskey = () =>
        !!localStorage.getItem(CREDENTIAL_KEY);

    function passkeyState() {
        if (isAuthenticated())       return 'authenticated';
        if (hasRegisteredPasskey())  return 'registered';
        return 'none';
    }

    function rpId() {
        /* WebAuthn requires a non-empty rpId matching the effective domain.
           file:// has an empty hostname; WebAuthn won't work there anyway,
           but we guard with supportsPasskey() before ever calling this. */
        return location.hostname || 'localhost';
    }

    async function registerPasskey() {
        const challenge = crypto.getRandomValues(new Uint8Array(32));
        const credential = await navigator.credentials.create({
            publicKey: {
                challenge,
                rp: { name: 'vientonorte', id: rpId() },
                user: {
                    id: new TextEncoder().encode('vientonorte-owner'),
                    name: 'vientonorte',
                    displayName: 'Rodrigo Gaete'
                },
                pubKeyCredParams: [
                    { type: 'public-key', alg: -7 },
                    { type: 'public-key', alg: -257 }
                ],
                authenticatorSelection: {
                    userVerification: 'required',
                    residentKey: 'preferred'
                },
                timeout: 60000
            }
        });
        const idBase64 = btoa(String.fromCharCode(
            ...new Uint8Array(credential.rawId)
        ));
        localStorage.setItem(CREDENTIAL_KEY, idBase64);
        sessionStorage.setItem(AUTH_SESSION_KEY, '1');
    }

    async function authenticatePasskey() {
        const stored = localStorage.getItem(CREDENTIAL_KEY);
        if (!stored) throw new Error('No passkey registered');
        const credentialId = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
        const challenge = crypto.getRandomValues(new Uint8Array(32));
        const assertion = await navigator.credentials.get({
            publicKey: {
                challenge,
                rpId: rpId(),
                allowCredentials: [{ type: 'public-key', id: credentialId }],
                userVerification: 'required',
                timeout: 60000
            }
        });
        if (assertion) {
            sessionStorage.setItem(AUTH_SESSION_KEY, '1');
            return true;
        }
        return false;
    }

    /* ── Passkey button UI ──────────────────────────────────────────── */
    const ICONS = {
        lock:   `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 7V5a4 4 0 0 1 8 0v2h.5A1.5 1.5 0 0 1 14 8.5v5A1.5 1.5 0 0 1 12.5 15h-9A1.5 1.5 0 0 1 2 13.5v-5A1.5 1.5 0 0 1 3.5 7H4Zm1.5 0h5V5a2.5 2.5 0 0 0-5 0v2Z"/></svg>`,
        unlock: `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M11 1a4 4 0 0 0-4 4v2H3.5A1.5 1.5 0 0 0 2 8.5v5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 12.5 7H8.5V5a2.5 2.5 0 0 1 5 0 .75.75 0 0 0 1.5 0A4 4 0 0 0 11 1Z"/></svg>`,
        key:    `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M10.5 0a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11Zm0 1.5a4 4 0 1 0 0 8 4 4 0 0 0 0-8ZM3.982 9.074l-3.75 3.75a.75.75 0 0 0 1.06 1.06l.19-.189V15a.75.75 0 0 0 1.5 0v-1.5h1.5a.75.75 0 0 0 0-1.5H4.5l2.5-2.5a5.465 5.465 0 0 1-3.018-1.426Z"/></svg>`
    };

    function updatePasskeyButton(btn) {
        const state = passkeyState();
        btn.removeAttribute('hidden');
        if (state === 'authenticated') {
            btn.innerHTML = `${ICONS.unlock} ${t('passkeyActive')}`;
            btn.className = 'btn-passkey btn-passkey--active';
            btn.setAttribute('aria-label', t('passkeyActiveLabelAria'));
            btn.title = t('passkeyActiveTitle');
        } else if (state === 'registered') {
            btn.innerHTML = `${ICONS.lock} ${t('passkeyUnlock')}`;
            btn.className = 'btn-passkey';
            btn.setAttribute('aria-label', t('passkeyUnlockLabelAria'));
            btn.title = t('passkeyUnlockTitle');
        } else {
            btn.innerHTML = `${ICONS.key} ${t('passkeySetup')}`;
            btn.className = 'btn-passkey';
            btn.setAttribute('aria-label', t('passkeySetupLabelAria'));
            btn.title = t('passkeySetupTitle');
        }
    }

    /* ── Security helpers ──────────────────────────────────────────── */
    function sanitizeHref(url) {
        try {
            const { protocol } = new URL(url);
            return (protocol === 'https:' || protocol === 'http:') ? url : '#';
        } catch {
            return '#';
        }
    }

    /* ── Card renderer ──────────────────────────────────────────────── */
    const BADGE_MAP = {
        live:       ['LIVE',       'card__badge--live'],
        private:    ['PRIVATE',    'card__badge--private'],
        repo:       ['REPO',       'card__badge--repo'],
        deprecated: ['DEPRECATED', 'card__badge--deprecated']
    };

    const ICONS_CARD = {
        site:   `<svg class="icon" aria-hidden="true"><use href="#icon-site"></use></svg>`,
        github: `<svg class="icon" aria-hidden="true"><use href="#icon-github"></use></svg>`
    };

    function renderLink(link, authenticated) {
        if (link.requiresAuth && !authenticated) {
            const lockedLabel = esc(t('lockedLink'));
            return `<span class="link-disabled"
                         aria-label="${lockedLabel}"
                         aria-disabled="true">
                        ${ICONS_CARD.github}
                        ${lockedLabel}
                    </span>`;
        }
        const icon = link.icon ? ICONS_CARD[link.icon] ?? '' : '';
        const safe = esc(sanitizeHref(link.href));
        const label = esc(getLangValue(link.label));
        return `<a href="${safe}" rel="noopener noreferrer" target="_blank">${icon}${label}</a>`;
    }

    function renderCard(project, authenticated) {
        const [badgeText, badgeClass] = BADGE_MAP[project.badge] ?? ['', ''];
        const locked = !!(project.requiresAuth && !authenticated);
        const cardClass = ['card',
            project.deprecated ? 'card--deprecated' : '',
            locked ? 'card--locked' : ''
        ].filter(Boolean).join(' ');
        const title = esc(getLangValue(project.title));
        const titleHref = !locked && project.links?.[0]?.href && !project.links[0].requiresAuth
            ? sanitizeHref(project.links[0].href) : null;
        const titleEl = titleHref
            ? `<a href="${esc(titleHref)}" rel="noopener noreferrer" target="_blank">${title}</a>`
            : title;
        const desc = locked
            ? `<div class="card__desc card__desc--locked">${esc(t('lockedDesc'))}</div>`
            : `<div class="card__desc">${esc(getLangValue(project.desc) ?? '')}</div>`;
        const tags = locked ? '' : `<ul class="card__tags" role="list">${
            (project.tags ?? []).map(tag => `<li class="tag">${esc(tag)}</li>`).join('')
        }</ul>`;
        const links = locked
            ? `<div class="card__links"><span class="link-disabled">${ICONS_CARD.github}${esc(t('lockedLink'))}</span></div>`
            : `<div class="card__links">${(project.links ?? []).map(l => renderLink(l, authenticated)).join('')}</div>`;

        return `
        <article class="${cardClass}" aria-label="${title}">
            <div class="card__header">
                <h2 class="card__title">${titleEl}</h2>
                ${badgeText ? `<span class="card__badge ${badgeClass}">${esc(badgeText)}</span>` : ''}
            </div>
            ${desc}
            ${tags}
            ${links}
        </article>`;
    }

    function renderStats(stats) {
        return stats.map(s => `
            <li class="stat">
                <span class="dot dot--${esc(s.dot)}" aria-hidden="true"></span>
                <strong>${esc(s.value)}</strong> ${esc(getLangValue(s.label))}
            </li>`).join('');
    }

    /* ── Toast helper ────────────────────────────────────────────────── */
    let _toastTimer;
    function showToast(msg) {
        const toast = document.getElementById('passkey-toast');
        toast.textContent = msg;
        toast.classList.add('passkey-toast--visible');
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => toast.classList.remove('passkey-toast--visible'), 4000);
    }

    /* ── Footer builder (DOM API — no innerHTML) ─────────────────────── */
    function buildFooter() {
        const p = document.getElementById('footer-text');
        const a = document.createElement('a');
        a.href = 'https://github.com/vientonorte';
        a.rel = 'noopener noreferrer';
        a.target = '_blank';
        a.textContent = 'github.com/vientonorte';
        p.textContent = '';
        p.append('vientonorte · ', a, ' · ', t('footerMonth'));
    }

    /* ── UI update helpers ────────────────────────────────────────────── */
    function updateUILanguage() {
        const lang = getCurrentLang();
        document.getElementById('page-title').textContent = t('pageTitle');
        document.getElementById('header-title').textContent = t('headerTitle');
        const _name = window._projectData?.meta?.name || '';
        const _role = getLangValue(window._projectData?.meta?.role) || '';
        document.getElementById('header-subtitle').textContent =
            _name && _role ? `${_name} · ${_role}` : (_name || _role);
        document.getElementById('skip-link').textContent = t('skipLink');
        document.getElementById('skip-link').href = '#proyectos';
        buildFooter();
        document.getElementById('lang-label').textContent = lang === 'es' ? 'EN' : 'ES';
        document.getElementById('btn-lang').setAttribute('aria-label', t('switchLanguage'));
        document.getElementById('cards-grid').setAttribute('aria-label', t('ariaProjects'));
        document.getElementById('stats-list').setAttribute('aria-label', t('ariaStats'));

        // Update contact links aria-labels using data-i18n attributes
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key && TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) {
                el.setAttribute('aria-label', t(key));
            }
        });
    }

    /* ── Bootstrap ──────────────────────────────────────────────────── */
    (async () => {
        const grid   = document.getElementById('cards-grid');
        const stats  = document.getElementById('stats-list');
        const btn    = document.getElementById('btn-passkey');
        const btnLang = document.getElementById('btn-lang');

        /* Initialize language — sync html[lang] without re-persisting to localStorage */
        document.documentElement.lang = getCurrentLang();

        /* Fetch project data first */
        let data;
        try {
            const ctrl = new AbortController();
            const fetchTimeout = setTimeout(() => ctrl.abort(), 5000);
            let res;
            try {
                res = await fetch('./data/projects.json', { signal: ctrl.signal });
            } finally {
                clearTimeout(fetchTimeout);
            }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            data = await res.json();
            if (!Array.isArray(data?.projects) || !data?.meta?.stats) {
                throw new Error('Unexpected JSON structure');
            }
            window._projectData = data; // Store for language updates
        } catch (err) {
            console.error('[vn] fetch projects.json:', err);
            grid.innerHTML = `<p class="load-error">${esc(t('loadError'))}</p>`;
            return;
        }

        function renderAll() {
            const auth = isAuthenticated();
            stats.innerHTML = renderStats(data.meta.stats);
            grid.innerHTML  = data.projects.map(p => renderCard(p, auth)).join('');
            updateUILanguage();
        }

        renderAll();

        /* Wire language switcher */
        btnLang.addEventListener('click', () => {
            const currentLang = getCurrentLang();
            const newLang = currentLang === 'es' ? 'en' : 'es';
            setCurrentLang(newLang);
            renderAll();
            if (supportsPasskey()) {
                updatePasskeyButton(btn);
            }
        });

        /* Wire passkey button — only after data is loaded so renderAll is in scope */
        if (supportsPasskey()) {
            updatePasskeyButton(btn);

            btn.addEventListener('click', async () => {
                const state = passkeyState();
                if (state === 'authenticated') {
                    sessionStorage.removeItem(AUTH_SESSION_KEY);
                    renderAll();
                    updatePasskeyButton(btn);
                    return;
                }
                btn.disabled = true;
                try {
                    if (state === 'none') {
                        await registerPasskey();
                    } else {
                        await authenticatePasskey();
                    }
                    renderAll();
                    updatePasskeyButton(btn);
                } catch (err) {
                    /* NotAllowedError = user cancelled the dialog — no feedback needed */
                    if (err.name !== 'NotAllowedError') {
                        showToast(t('passkeyError'));
                    }
                } finally {
                    btn.disabled = false;
                }
            });
        }
    })();
    </script>

</body>
