<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Proyectos de Rodrigo Gaete Gaona — UX Lead e Investigador doctoral en Antropología. Dashboard de repositorios en producción.">
    <meta property="og:title" content="vientonorte — Proyectos">
    <meta property="og:description" content="UX Lead · Investigador doctoral en Antropología · Proyectos en producción">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vientonorte.github.io">
    <meta property="og:image" content="https://vientonorte.github.io/antropologia-corrupcion/img/an-lisis-ux-ui-mapeo-de-vulnerabilidades-de-expe.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="vientonorte — Proyectos">
    <meta name="twitter:description" content="UX Lead · Investigador doctoral en Antropología · Proyectos en producción">
    <meta name="twitter:image" content="https://vientonorte.github.io/antropologia-corrupcion/img/an-lisis-ux-ui-mapeo-de-vulnerabilidades-de-expe.jpg">
    <title>vientonorte — Proyectos</title>
    
    <!-- Vientonorte Design System v1.0.0 from CDN -->
    <link rel="stylesheet" href="/cdn/v1/vientonorte.css">
</head>

<body>
    <!-- SVG sprite — iconos reutilizables via <use href="#id"> -->
    <svg style="display:none" aria-hidden="true" focusable="false">
        <defs>
            <symbol id="icon-site" viewBox="0 0 16 16">
                <path d="M4.5 8a.75.75 0 0 0 0 1.5h7a.75.75 0 0 0 0-1.5h-7Z"/>
                <path d="M1 1.75C1 .784 1.784 0 2.75 0h10.5c.966 0 1.75.784 1.75 1.75v12.5A1.75 1.75 0 0 1 13.25 16H2.75A1.75 1.75 0 0 1 1 14.25V1.75Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25Z"/>
            </symbol>
            <symbol id="icon-github" viewBox="0 0 16 16">
                <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
            </symbol>
        </defs>
    </svg>

    <a class="skip-link" href="#proyectos">Saltar al contenido</a>

    <header>
        <h1><span>vientonorte</span> — proyectos</h1>
        <p>Rodrigo Gaete Gaona · UX Lead · Investigador doctoral en Antropología</p>
        <div class="stats" id="stats">
            <!-- Stats will be dynamically generated -->
        </div>
    </header>

    <main id="proyectos">
        <div class="grid" id="projects-grid">
            <!-- Projects will be dynamically rendered here -->
        </div>
    </main>

    <footer>
        <p>vientonorte · <a href="https://github.com/vientonorte">github.com/vientonorte</a> · Abril 2026</p>
    </footer>

    <script>
        /**
         * Vientonorte Dashboard - Dynamic Project Renderer
         * Fetches project metadata from JSON and renders cards with auto-calculated KPIs
         */

        (function() {
            'use strict';

            // Configuration
            const DATA_URL = '/data/projects.json';
            const CURRENT_YEAR = new Date().getFullYear();

            /**
             * Calculate KPI statistics from projects data
             */
            function calculateStats(projects) {
                const stats = {
                    live: 0,
                    private: 0,
                    repo: 0,
                    deprecated: 0,
                    sprint: CURRENT_YEAR
                };

                projects.forEach(project => {
                    if (project.deprecated) {
                        stats.deprecated++;
                    } else if (project.status === 'live') {
                        stats.live++;
                    } else if (project.status === 'private') {
                        stats.private++;
                    } else if (project.status === 'repo') {
                        stats.repo++;
                    }
                });

                return stats;
            }

            /**
             * Render stats in header
             */
            function renderStats(stats) {
                const statsContainer = document.getElementById('stats');
                statsContainer.innerHTML = `
                    <div class="stat">
                        <span class="dot dot--live" aria-label="En producción"></span>
                        <strong>${stats.live}</strong> en producción
                    </div>
                    <div class="stat">
                        <span class="dot dot--private" aria-label="Privado"></span>
                        <strong>${stats.private}</strong> privado
                    </div>
                    <div class="stat">
                        <span class="dot dot--off" aria-label="Sin deploy"></span>
                        <strong>${stats.repo}</strong> sin deploy
                    </div>
                    <div class="stat">
                        <span class="dot dot--deprecated" aria-label="Deprecado"></span>
                        <strong>${stats.deprecated}</strong> deprecado
                    </div>
                    <div class="stat">
                        <span class="dot dot--sprint" aria-label="Sprint activo"></span>
                        <strong>${stats.sprint}</strong> sprint activo
                    </div>
                `;
            }

            /**
             * Get badge class and text for project status
             */
            function getBadge(project) {
                if (project.deprecated) {
                    return { class: 'card__badge--deprecated', text: 'DEPRECATED' };
                }
                
                switch (project.status) {
                    case 'live':
                        return { class: 'card__badge--live', text: 'LIVE' };
                    case 'private':
                        return { class: 'card__badge--private', text: 'PRIVADO' };
                    case 'repo':
                        return { class: 'card__badge--repo', text: 'REPO' };
                    default:
                        return { class: '', text: project.status.toUpperCase() };
                }
            }

            /**
             * Render project links
             */
            function renderLinks(project) {
                let links = '';

                if (project.url) {
                    links += `
                        <a href="${project.url}">
                            <svg class="icon" aria-hidden="true"><use href="#icon-site"></use></svg>
                            Ver sitio
                        </a>
                    `;
                }

                if (project.repo) {
                    links += `
                        <a href="${project.repo}">
                            <svg class="icon" aria-hidden="true"><use href="#icon-github"></use></svg>
                            Código
                        </a>
                    `;
                } else if (project.private) {
                    links += `
                        <span class="link-disabled" role="link" aria-disabled="true" tabindex="0" title="Repositorio privado">
                            <svg class="icon" aria-hidden="true"><use href="#icon-github"></use></svg>
                            Acceso restringido
                        </span>
                    `;
                }

                return links;
            }

            /**
             * Render project tags
             */
            function renderTags(tags) {
                return tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            }

            /**
             * Render a single project card
             */
            function renderProject(project) {
                const badge = getBadge(project);
                const cardClass = project.deprecated ? 'card card--deprecated' : 'card';
                const titleLink = project.url ? 
                    `<a href="${project.url}">${project.title}</a>` : 
                    project.title;

                return `
                    <article class="${cardClass}" aria-label="${project.ariaLabel}">
                        <div class="card__header">
                            <div class="card__title">${titleLink}</div>
                            <span class="card__badge ${badge.class}">${badge.text}</span>
                        </div>
                        <div class="card__desc">
                            ${project.description}
                        </div>
                        <div class="card__tags">
                            ${renderTags(project.tags)}
                        </div>
                        <div class="card__links">
                            ${renderLinks(project)}
                        </div>
                    </article>
                `;
            }

            /**
             * Render all projects
             */
            function renderProjects(projects) {
                const grid = document.getElementById('projects-grid');
                grid.innerHTML = projects.map(renderProject).join('');
            }

            /**
             * Main initialization
             */
            async function init() {
                try {
                    const response = await fetch(DATA_URL);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    const stats = calculateStats(data.projects);
                    
                    renderStats(stats);
                    renderProjects(data.projects);

                } catch (error) {
                    console.error('Error loading projects:', error);
                    
                    // Fallback error message
                    document.getElementById('stats').innerHTML = 
                        '<div class="stat text-muted">Error cargando proyectos</div>';
                    document.getElementById('projects-grid').innerHTML = 
                        '<p class="text-muted">No se pudieron cargar los proyectos. Por favor, recarga la página.</p>';
                }
            }

            // Initialize when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>

</body>

</html>
