name: Validate Graph Schema

on:
  push:
    paths:
      - 'data/**'
      - 'pipeline/**'
      - 'tests/**'
      - '*.html'
      - '*.json'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'data/**'
      - 'pipeline/**'
      - 'tests/**'
      - '*.html'
      - '*.json'
      - '.github/workflows/**'

jobs:
  validate-schema:
    name: JSON Schema (Draft-07)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli@5

      - name: Validate nodes.json against nodes-collection.schema.json
        run: |
          ajv validate \
            -s data/schema/nodes-collection.schema.json \
            -r data/schema/node.schema.json \
            -d "data/graph/nodes.json" \
            --all-errors \
            --spec=draft7 \
            --validate-formats=false

      - name: Validate edges.json against edges-collection.schema.json
        run: |
          ajv validate \
            -s data/schema/edges-collection.schema.json \
            -r data/schema/edge.schema.json \
            -d "data/graph/edges.json" \
            --all-errors \
            --spec=draft7 \
            --validate-formats=false

      - name: Validate projects.json against projects.schema.json
        run: |
          ajv validate \
            -s data/schema/projects.schema.json \
            -d "data/projects.json" \
            --all-errors \
            --spec=draft7 \
            --validate-formats=false

      - name: Validate node-specific schemas
        run: |
          # Validar que los schemas de nodos tipo-específicos existan y sean válidos JSON
          for schema in data/schema/nodes/*.schema.json; do
            echo "Validating schema: $schema"
            python3 -c "import json; json.load(open('$schema'))" || exit 1
          done

  validate-pipeline:
    name: Pipeline SCA (Python 3.x)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Run validate_flow.py on sample data
        run: |
          python pipeline/validate_flow.py \
            --edges data/graph/edges.json \
            --output /tmp/sca-report.json

      - name: Check for CRITICAL risk flows
        run: |
          python pipeline/validate_flow.py \
            --edges data/graph/edges.json \
            --fail-on-high
        continue-on-error: true
        # continue-on-error: el pipeline no bloquea el merge, pero deja evidencia

      - name: Upload SCA report artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: sca-report
          path: /tmp/sca-report.json
          retention-days: 90

  test-python:
    name: Python Tests & Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run ruff linter
        run: |
          ruff check pipeline/ tests/

      - name: Run ruff formatter check
        run: |
          ruff format --check pipeline/ tests/

      - name: Run pytest
        run: |
          pytest tests/ -v --cov=pipeline --cov-report=term --cov-report=xml

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  lint-frontend:
    name: Frontend Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci

      - name: Run ESLint
        run: |
          npm run lint:js

      - name: Run HTMLHint
        run: |
          npm run lint:html
